<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work IQ Agent</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div class="app">
      <!-- Minimal top bar -->
      <header class="topbar">
        <div class="brand">
          <span id="brand-name">Work IQ Agent</span>
          <svg class="chev" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="account">
          <span id="account-name" class="muted"></span>
          <span id="provider-badge" class="badge" hidden></span>
          <button id="new-btn" class="icon-btn" title="New chat" hidden aria-label="New chat">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
          <button id="logout-btn" class="ghost" hidden>Sign out</button>
        </div>
      </header>

      <!-- Sign-in panel -->
      <section id="login-panel" class="center-panel" hidden>
        <div class="card">
          <h2>Sign in to start</h2>
          <p class="muted">Use your Microsoft 365 account (delegated auth).</p>
          <button id="login-btn" class="primary">Sign in</button>

          <div id="device-code" class="device-code" hidden>
            <p>Go to the following URL and enter the code:</p>
            <a id="device-uri" href="#" target="_blank" rel="noopener"></a>
            <div class="code-row">
              <code id="device-user-code"></code>
              <button id="copy-code" class="ghost">Copy</button>
            </div>
            <p class="muted small">You'll be taken to the chat screen automatically after signing in…</p>
          </div>
          <p id="login-error" class="error" hidden></p>
        </div>
      </section>

      <!-- Chat panel -->
      <section id="chat-panel" class="chat" hidden>
        <div id="messages" class="messages" aria-live="polite"></div>

        <div class="centerblock">
          <h1 id="hero-title" class="hero-title">What's on your mind today?</h1>

          <form id="chat-form" class="composer">
            <button type="button" class="c-add" title="Add" aria-label="Add">
              <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
            <input
              id="chat-input"
              class="c-input"
              type="text"
              placeholder="Ask anything"
              autocomplete="off"
            />
            <button type="button" class="c-mic" title="Voice" aria-label="Voice">
              <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
            </button>
            <button type="submit" class="c-send" id="send-btn" title="Send" aria-label="Send">
              <svg class="i-wave" viewBox="0 0 24 24" width="20" height="20"><path d="M4 12h1M8 8v8M12 5v14M16 8v8M20 12h0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              <svg class="i-arrow" viewBox="0 0 24 24" width="20" height="20"><path d="M12 19V5M6 11l6-6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </form>

          <div id="suggestions" class="suggestions">
            <button class="suggestion">
              <svg viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="4" width="18" height="17" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M3 9h18M8 2v4M16 2v4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
              <span>我今天有哪些會議？</span>
            </button>
            <button class="suggestion">
              <svg viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M4 7l8 6 8-6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span>發一封提醒信件給我自己記得報帳</span>
            </button>
            <button class="suggestion">
              <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 6h16M4 12h16M4 18h10" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
              <span>摘要我未讀的郵件，然後寄一份摘要給我自己</span>
            </button>
          </div>
        </div>
      </section>
    </div>
    <script src="app.js"></script>
  </body>
</html>
